name: core_monitor
description: "Core Monitor - MikroTik Manager"
publish_to: 'none'
version: 5.4.0+16

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Storage lokal
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4

  # Icon
  cupertino_icons: ^1.0.8

  # Animasi
  animate_do: ^3.3.4

  # File / path handling
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Permission handling
  permission_handler: ^11.3.1

  # External links
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/core_monitor_logo.jpg

name: core_monitor
description: "Core Monitor - MikroTik Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Storage lokal
  shared_preferences: ^2.2.2

  # Icon
